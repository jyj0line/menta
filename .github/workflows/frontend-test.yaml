name: Frontend Test

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_NEXTJS_ORIGIN: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_API_PROJECT_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_AK_PUBLISHABLE: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: ESLint Test
  # ─────────────────────────────────────────────────────
  lint:
    name: ESLint Test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── ESLint Test ──────────────────────────────────────
      - name: ESLint Test
      - run: npx eslint

  # ─────────────────────────────────────────────────────
  # Job 2: Unit & Integration Tests (Vitest + RTL)
  # ─────────────────────────────────────────────────────
  unit-integration-tests:
    name: Unit & Integration Tests (Vitest + RTL)
    needs: ESLint Test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Setup Supabase Local DB ──────────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start DB
        run: supabase db start

      - name: Reset DB (apply migrations + seed)
        run: supabase db reset

      # ── Unit & Integration Test (Vitest + RTL) ──────────────────────────────────────
      - name: Run Vitest
        run: npx vitest run --coverage

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: vitest-report
          path: vitest-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────
  # Job 3: E2E Tests
  # ─────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests (Playwright)
    needs: unit-integration-tests
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Setup Supabase Local Stack ──────────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start Supabase
        run: supabase start

      - name: Reset DB (apply migrations + seed)
        run: supabase db reset

      # ── Setup Next.js ──────────────────────────────────────
      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npx next build --turbopack

      - name: Start Next.js
        run: npx next start &

      - name: Wait for Next.js
        run: npx wait-on $NEXT_PUBLIC_NEXTJS_ORIGIN $NEXT_PUBLIC_SUPABASE_API_PROJECT_URL

      # ── E2E Tests (Playwright) ──────────────────────────────────────
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30