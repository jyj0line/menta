name: Frontend Test

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_NEXTJS_ORIGIN: http://localhost:3000
  NEXT_PUBLIC_SUPABASE_API_PROJECT_URL: http://127.0.0.1:54321
  NEXT_PUBLIC_SUPABASE_AK_PUBLISHABLE: sb_publishable_ACJWlzQHlZjBrEguHvfOxg_3BJgxAaH

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: ESLint & i18n-check Test
  # ─────────────────────────────────────────────────────
  eslint-i18ncheck-test:
    name: ESLint & i18n-check Test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── ESLint Test ──────────────────────────────────────
      - name: ESLint Test
        run: npm run eslint

      # ── i18n-check Test ──────────────────────────────────────
      - name: i18n-check Test
        run: npm run i18ncheck

  # ─────────────────────────────────────────────────────
  # Job 2: Unit & Integration Test (Vitest + RTL)
  # ─────────────────────────────────────────────────────
  unit-integration-test:
    name: Unit & Integration Test (Vitest + RTL)
    needs: eslint-i18ncheck-test
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Setup Supabase Local DB ──────────────────────────────────────
      - name: Start DB
        run: npm run supabase:dbstart

      - name: Reset DB (apply migrations + seed)
        run: npm run supabase:reset

      # ── Unit & Integration Test (Vitest + RTL) ──────────────────────────────────────
      - name: Run Vitest
        run: npm run vitest--cvr

      - name: Upload coverage report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4
        with:
          name: vitest-report
          path: vitest-report/
          retention-days: 30

  # ─────────────────────────────────────────────────────
  # Job 3: E2E Test
  # ─────────────────────────────────────────────────────
  e2e-tests:
    name: E2E Test (Playwright)
    needs: unit-integration-test
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Setup CI environment  ──────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Setup Supabase Local Stack ──────────────────────────────────────
      - name: Start Supabase
        run: npm run supabase:start

      - name: Reset DB (apply migrations + seed)
        run: npm run supabase:reset

      # ── Setup Next.js ──────────────────────────────────────
      - name: Cache Next.js build
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 #v5
        with:
          path: |
            ~/.npm
            ${{ github.workspace }}/.next/cache
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('**/*.js', '**/*.jsx', '**/*.ts', '**/*.tsx') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json') }}-

      - name: Build Next.js
        run: npm run build--tp

      - name: Start Next.js
        run: npm run start &

      - name: Wait for Next.js
        run: npm run playwright:wait

      # ── E2E Tests (Playwright) ──────────────────────────────────────
      - name: Install Playwright Browsers
        run: npm run playwright:deps

      - name: Run Playwright tests
        run: npm run playwright

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30