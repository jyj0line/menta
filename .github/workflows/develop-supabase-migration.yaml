name: Production Supabase Migration

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: supabase check (local db lint, test, type-check)
  # ─────────────────────────────────────────────────────
  supabase-check:
    name: supabase check (local db lint, test, type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Local DB Validation ─────────────────────────────────
      - name: Start local DB
        run: npm run supabase:dbstart

      - name: Lint DB
        run: npm run supabase:lint

      - name: Test DB
        run: npm run supabase:test

      - name: Verify generated types are checked in
        run: |
          npm run supabase:type
          if ! git diff --ignore-space-at-eol --exit-code --quiet libs/supabase/supabase.type.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

  # ─────────────────────────────────────────────────────
  # Job 2: supabase migration(from local db to remote db)
  # ─────────────────────────────────────────────────────
  supabase-migration-dryrun:
    name: supabase migration(from local db to remote db)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: supabase-check
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
    environment: menta-production-environment
    env:
      PRODUCTION_SUPABASE_DATABASE_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DATABASE_PASSWORD }}
      PRODUCTION_SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Remote Production DB Migration ───────────────────────────
      - name: link supabase remote production project
        run: npm run supabase:link

      - name: production db migration
        run: npm run supabase:push

      - name: upload production db migration report
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 #v4
        with:
          name: production-migration-report
          path: production-migration-report/
          retention-days: 30