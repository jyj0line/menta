name: Develop Supabase Migration

on:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: develop supabase check (local db lint, test, type-check)
  # ─────────────────────────────────────────────────────
  develop-supabase-check:
    name: develop supabase check (local db lint, test, type-check)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Local DB Validation ─────────────────────────────────
      - name: Start local DB
        run: npm run supabase:dbstart

      - name: Lint DB
        run: npm run supabase:lint

      - name: Test DB
        run: npm run supabase:test

      - name: Verify generated types are checked in
        run: |
          npm run supabase:type
          if ! git diff --ignore-space-at-eol --exit-code --quiet libs/supabase/supabase.type.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

  # ─────────────────────────────────────────────────────
  # Job 2: develop supabase migration(from local db to remote db)
  # ─────────────────────────────────────────────────────
  develop-supabase-migration:
    name: develop supabase migration(from local db to remote db)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    needs: develop-supabase-check
    if: github.event_name == 'workflow_dispatch' && github.ref_name == 'main'
    environment: menta-develop-environment
    env:
      PRODUCTION_SUPABASE_DATABASE_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DATABASE_PASSWORD }}
      PRODUCTION_SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_ID }}
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Remote Develop DB Migration ───────────────────────────
      - name: link develop supabase remote project
        run: npm run supabase:link

      - name: develop db migration
        run: npm run supabase:push