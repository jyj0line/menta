name: Production Supabase Migration

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: supabase migration (from local db to remote db)
  # ─────────────────────────────────────────────────────
  supabase-migration:
    name: supabase migration (from local db to remote db)
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: |
      (github.event_name == 'push' && github.ref_name == 'main') ||
      (github.event_name == 'workflow_dispatch' && github.ref_name == 'main')
    environment: menta-production-environment
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.PRODUCTION_SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.PRODUCTION_SUPABASE_PROJECT_ID }}

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd #v6

      - name: Setup and Cache Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f #v6
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      # ── Remote DB Migration ───────────────────────────
      - name: Link Supabase remote project
        run: npm run supabase:link

      - name: DB migration
        run: npm run supabase:push