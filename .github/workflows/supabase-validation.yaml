name: Supabase Validation

on:
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────
  # Job 1: Local DB Validation (lint, test, type-check)
  # ─────────────────────────────────────────────────────
  supabase_validation:
    name: Local DB Validation (lint, test, type-check)
    timeout-minutes: 60
    runs-on: ubuntu-latest

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Local DB Validation ─────────────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Start local DB
        run: supabase db start

      - name: Lint DB
        run: supabase db lint

      - name: Test DB
        run: supabase test db

      - name: Verify generated types are checked in
        run: |
          supabase gen types typescript --local > types.gen.ts
          if ! git diff --ignore-space-at-eol --exit-code --quiet types.gen.ts; then
            echo "Detected uncommitted changes after build. See status below:"
            git diff
            exit 1
          fi

  # ─────────────────────────────────────────────────────
  # Job 2: Remote DB Migration Dry-run
  # ─────────────────────────────────────────────────────
  supabase_migration_dryrun:
    name: Remote DB Migration Dry-run
    timeout-minutes: 60
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}

    steps:
      # ── Setup CI environment ───────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v6

      # ── Remote DB Migration Dry-run ───────────────────────────
      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase remote project
        run: supabase link --project-ref $SUPABASE_PROJECT_ID

      - name: Dry-run DB migration
        run: supabase db push --dry-run